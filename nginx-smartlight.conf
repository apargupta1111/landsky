server {
    listen 3001;
    server_name _;

    # ── Serve built React/Vite frontend ───────────────────────────────────────
    root /var/www/smartlight;   # <-- path where dist/ was copied on the server
    index index.html;

    # SPA fallback: serve index.html for any unknown route (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Node-RED proxy  (/nr-api → http://13.205.43.53:1880) ─────────────────
    location /nr-api/ {
        proxy_pass         http://13.205.43.53:1880/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
    }

    # ── TTS proxy  (/tts-api → http://13.205.43.53) ───────────────────────────
    location /tts-api/ {
        proxy_pass         http://13.205.43.53/;
        proxy_http_version 1.1;
        proxy_set_header   Host              13.205.43.53;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
