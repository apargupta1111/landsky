<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>landsky</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
      /* Leaflet popup — adapts to light/dark via CSS variables */
      .sl-popup .leaflet-popup-content-wrapper {
        background: var(--bg-color, #ffffff);
        border: 1px solid var(--panel-border, #e2e8f0);
        border-radius: 12px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.12), 0 0 16px rgba(0,229,255,0.08);
        color: var(--text-primary, #1e293b);
      }
      .sl-popup .leaflet-popup-tip {
        background: var(--bg-color, #ffffff);
      }
      /* Pulse ring keyframe for SVG markers */
      @keyframes ping {
        75%, 100% { transform: scale(2); opacity: 0; }
      }
    </style>
  </head>
  <body>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
